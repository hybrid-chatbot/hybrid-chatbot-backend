spring:
  application:
    name: demo
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    mongodb:
      uri: ${MONGODB_URI:}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}

openai:
  model: gpt-4o
  api-key: ${OPENAI_API_KEY:}

dialogflow:
  project-id: ${DIALOGFLOW_PROJECT_ID:hybrid-chatbot}
  enabled: ${DIALOGFLOW_ENABLED:false}

ai:
  server:
    url: ${AI_SERVER_URL:http://localhost:8000}

naver:
  shopping:
    client:
      id: ${NAVER_SHOPPING_CLIENT_ID:}
      secret: ${NAVER_SHOPPING_CLIENT_SECRET:}

server:
  port: ${SERVER_PORT:8080}